# /etc/nginx/sites-available/myproject
# Nginx конфигурациясы — Лаб №15
#
# Қосу:
#   sudo ln -s /etc/nginx/sites-available/myproject /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ── Статикалық файлдар — Nginx тікелей береді (Django-ны айналып өтеді) ──
    location /static/ {
        alias /home/user/myproject/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Медиа файлдар ──────────────────────────────────────────────────────────
    location /media/ {
        alias /home/user/myproject/media/;
    }

    # ── Барлық қалған сұраныс → Gunicorn-ға жіберіледі ────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;   # Gunicorn тыңдайтын порт
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
